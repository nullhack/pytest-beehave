<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Background -->
  <rect width="800" height="500" fill="#1e2128"/>

  <!-- === ANTENNAE (above the bar) === -->
  <!-- Left antenna stem: curves up-left from bar -->
  <path d="M 330 170 Q 295 130 272 105" stroke="#f5a800" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="268" cy="101" r="9" fill="#f5a800"/>

  <!-- Right antenna stem: curves up-right from bar -->
  <path d="M 470 170 Q 505 130 528 105" stroke="#f5a800" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="532" cy="101" r="9" fill="#f5a800"/>

  <!-- === HORIZONTAL BAR (like pytest's gray pill) === -->
  <rect x="280" y="172" width="240" height="22" rx="11" ry="11" fill="#3a3d47"/>

  <!-- === VERTICAL BARS hanging from horizontal bar (descending height, bee colors) === -->
  <!-- Bar 1 (leftmost, tallest) — deep amber -->
  <rect x="295" y="194" width="38" height="160" rx="6" ry="6" fill="#f5a800"/>

  <!-- Bar 2 — slightly shorter, golden -->
  <rect x="347" y="194" width="38" height="130" rx="6" ry="6" fill="#f5a800"/>

  <!-- Bar 3 — medium, darker amber -->
  <rect x="399" y="194" width="38" height="100" rx="6" ry="6" fill="#c87d00"/>

  <!-- Bar 4 (rightmost, shortest) — darkest -->
  <rect x="451" y="194" width="38" height="70" rx="6" ry="6" fill="#c87d00"/>

</svg>
