<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200">
  <!-- Background -->
  <rect width="860" height="200" rx="14" ry="14" fill="#1e2128"/>

  <!-- === LOGO MARK ===
       Original elements span x:260-550, y:90-370 (290×280 units)
       scale(0.5) → 145×140px, translate(-100, 20) shifts origin so x:260→30
  -->
  <g transform="translate(-100, -30) scale(0.5)">

    <!-- Left antenna -->
    <path d="M 330 170 Q 295 130 272 105" stroke="#f5a800" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="268" cy="101" r="9" fill="#f5a800"/>

    <!-- Right antenna -->
    <path d="M 470 170 Q 505 130 528 105" stroke="#f5a800" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="532" cy="101" r="9" fill="#f5a800"/>

    <!-- Horizontal bar -->
    <rect x="280" y="172" width="240" height="22" rx="11" ry="11" fill="#3a3d47"/>

    <!-- Bar 1 — tallest, bright amber -->
    <rect x="295" y="194" width="38" height="160" rx="6" ry="6" fill="#f5a800"/>

    <!-- Bar 2 — golden -->
    <rect x="347" y="194" width="38" height="130" rx="6" ry="6" fill="#f5a800"/>

    <!-- Bar 3 — darker amber -->
    <rect x="399" y="194" width="38" height="100" rx="6" ry="6" fill="#c87d00"/>

    <!-- Bar 4 — shortest, darkest -->
    <rect x="451" y="194" width="38" height="70" rx="6" ry="6" fill="#c87d00"/>

  </g>

  <!-- === WORDMARK ===
       Logo mark renders to ~x:30-175 in banner space.
       Text starts at x:220 for clear separation.
  -->
  <text
    x="220"
    y="105"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="96"
    font-weight="700"
    letter-spacing="-2"
    dominant-baseline="middle"
  >
    <tspan fill="#f5a800">Bee</tspan><tspan fill="#c8cad4">Have</tspan>
  </text>

  <!-- Thin amber underline accent -->
  <rect x="220" y="158" width="620" height="4" rx="2" ry="2" fill="#f5a800" opacity="0.35"/>

</svg>
